<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: var(--sans); background-color: var(--gelo); color: var(--tinta); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }

  .nav-logo { font-family: var(--sans); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tinta); text-decoration: none; line-height: 1.1; }
  .nav-back { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grafite); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--cacau); }
  footer { padding: 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; background: var(--gelo); }
  .footer-logo { font-family: var(--sans); font-weight: 600; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--tinta); }
  .footer-copy { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--cinza-txt); }
  .footer-social a { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--grafite); text-decoration: none; border-bottom: 1px solid var(--grafite); padding-bottom: 2px; }
  @media (max-width: 900px) { nav { padding: 1.2rem 1.3rem; } footer { padding: 2.5rem 1.3rem; flex-direction: column; text-align: center; } }

  .em-breve { min-height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8rem 2rem 4rem; }
  .eb-kicker { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cacau); margin-bottom: 2.5rem; }
  .eb-title { font-family: var(--sans); font-weight: 500; font-size: clamp(2.6rem, 7vw, 5.5rem); line-height: 1; letter-spacing: -0.02em; color: var(--tinta); margin-bottom: 1.2rem; }
  .eb-title em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--cacau); }
  .eb-sub { font-family: var(--serif); font-style: italic; font-size: clamp(1.2rem, 2vw, 1.7rem); color: var(--grafite); max-width: 520px; margin-bottom: 3rem; line-height: 1.5; }
  .eb-note { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.05em; color: var(--cinza-txt); }
  .eb-line { width: 50px; height: 1px; background: var(--cacau-soft); margin: 0 auto 2.5rem; }
